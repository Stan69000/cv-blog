backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Article"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    preview_path: "/blog/{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date de publication", name: "pubDate", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["book", "floppy"]
        default: "book"
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: []
      - label: "En vedette"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Brouillon"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "Image à la une"
        name: "heroImage"
        widget: "image"
        required: false
      - label: "Contenu"
        name: "body"
        widget: "markdown"

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Description SEO", name: "description", widget: "text" }
      - { label: "Ordre dans le menu", name: "order", widget: "number", default: 0 }
      - label: "Brouillon"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "Contenu"
        name: "body"
        widget: "markdown"

  - name: "settings"
    label: "Paramètres"
    files:
      - name: "general"
        label: "Général"
        file: "src/data/site.json"
        fields:
          - { label: "Titre du site", name: "title", widget: "string" }
          - { label: "Slogan", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Auteur", name: "author", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "URL du site", name: "url", widget: "string" }

      - name: "social"
        label: "Réseaux sociaux"
        file: "src/data/social.json"
        fields:
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Twitter/X", name: "twitter", widget: "string", required: false }
          - { label: "GitHub", name: "github", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }

      - name: "home"
        label: "Accueil"
        file: "src/data/home.json"
        fields:
          - { label: "Titre principal", name: "headline", widget: "string" }
          - { label: "Sous-titre", name: "subheadline", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Afficher la carte", name: "showMap", widget: "boolean", default: true }
          - { label: "Afficher Parcours", name: "showParcours", widget: "boolean", default: true }
          - { label: "Afficher Projets", name: "showProjets", widget: "boolean", default: true }
          - { label: "Afficher Engagement", name: "showEngagement", widget: "boolean", default: true }
          - { label: "Afficher Blog", name: "showBlog", widget: "boolean", default: true }

      - name: "profile"
        label: "Profil"
        file: "src/data/profile.json"
        fields:
          - { label: "Nom", name: "name", widget: "string" }
          - { label: "Titre/Poste", name: "title", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Localisation", name: "location", widget: "string", required: false }
          - { label: "Années d'expérience", name: "experienceYears", widget: "number" }
          - { label: "Texte expérience", name: "experienceLabel", widget: "string" }
          - label: "Compétences"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Nom", name: "name", widget: "string" }
              - { label: "Niveau (0-100)", name: "level", widget: "number" }
          - label: "Statistiques"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Valeur", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      - name: "blog_settings"
        label: "Blog"
        file: "src/data/blog.json"
        fields:
          - { label: "Articles vedettes max", name: "featuredLimit", widget: "number", default: 3 }
          - { label: "Bibliothèque Livres", name: "showLibraryBooks", widget: "boolean", default: true }
          - { label: "Bibliothèque Disquettes", name: "showLibraryFloppies", widget: "boolean", default: true }
          - label: "Type par défaut"
            name: "defaultType"
            widget: "select"
            options: ["book", "floppy"]
            default: "book"

      - name: "seo"
        label: "SEO"
        file: "src/data/seo.json"
        fields:
          - { label: "Titre par défaut", name: "defaultTitle", widget: "string" }
          - { label: "Description par défaut", name: "defaultDescription", widget: "text" }
          - { label: "Image OG", name: "ogImage", widget: "image", required: false }
          - { label: "Twitter (@username)", name: "twitter", widget: "string", required: false }
          - { label: "Ne pas indexer", name: "noIndex", widget: "boolean", default: false }

      - name: "footer"
        label: "Footer"
        file: "src/data/footer.json"
        fields:
          - { label: "Copyright ({year} pour l'année)", name: "copyright", widget: "string" }
          - { label: "Texte 'Construit avec'", name: "built_with", widget: "string" }
