name: Deploy O2Switch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Clean previous build output
        run: rm -rf dist

      - name: Build static website
        env:
          PUBLIC_ADMIN_URL: ${{ vars.PUBLIC_ADMIN_URL }}
        run: npm run build:o2switch

      - name: Delete legacy sitemap.xml from server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          curl -s -u "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_SERVER:$FTP_PORT/" \
            -Q "DELE ${FTP_SERVER_DIR}sitemap.xml" || true

      - name: Upload to O2Switch via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
